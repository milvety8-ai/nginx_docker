services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_gateway
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl/.htpasswd:/etc/nginx/ssl/.htpasswd:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api_v1
      - api_v2
      - api_slow
      - ws_server
    networks:
      - frontend
      - backend
    restart: unless-stopped

  api_v1:
    build: ./services/api-v1
    container_name: api_v1
    environment:
      - SERVICE_VERSION=v1
      - SERVICE_COLOR=blue
    networks:
      - backend
    restart: unless-stopped

  api_v2:
    build: ./services/api-v2
    container_name: api_v2
    environment:
      - SERVICE_VERSION=v2
      - SERVICE_COLOR=green
    networks:
      - backend
    restart: unless-stopped

  api_slow:
    build: ./services/api-slow
    container_name: api_slow
    environment:
      - SERVICE_VERSION=slow
      - SERVICE_COLOR=orange
      - SLOW_SECONDS=3
    networks:
      - backend
    restart: unless-stopped

  ws_server:
    build: ./services/ws-server
    container_name: ws_server
    networks:
      - backend
    restart: unless-stopped

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - -nginx.scrape-uri=http://nginx_gateway/nginx_status
    ports:
      - "9113:9113"
    networks:
      - backend
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  nginx_logs:
  nginx_cache: