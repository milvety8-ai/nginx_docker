upstream api_v1_upstream {
  server api_v1:8000;
}

upstream api_v2_upstream {
  server api_v2:8000;
}

upstream api_slow_upstream {
  server api_slow:8000;
}

upstream ws_upstream {
  server ws_server:8080;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  add_header X-Request-ID $request_id always;
  error_page 404 /404.html;
  error_page 500 502 503 504 /50x.html;

  # Redirect /old-api -> /api (301 Permanent)
  location /old-api {
    rewrite ^/old-api(.*)$ /api$1 permanent;
  }

  # Regex location + redirect (extra task)
  location ~* ^/api$ {
    return 301 /api/;
  }

  # Exact match is faster than regex location
  location = /favicon.ico {
    log_not_found off;
    access_log off;
    return 204;
  }

  # Block direct access to .env and hidden files
  location ~ /\. {
    deny all;
    return 404;
  }

  # Rewrite with capture groups
  location ~ ^/blog/?(\d+)$ {
    return 302 /articles?id=$1;
  }

  # Custom deny location
  location /admin {
    deny all;
    return 403;
  }

  # Custom redirect
  location = /docs {
    return 302 /;
  }

  location = /nginx_status {
    stub_status;
    access_log off;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ =404;
  }

  location = /404.html {
    root /usr/share/nginx/html;
    internal;
  }

  location = /50x.html {
    root /usr/share/nginx/html;
    internal;
  }

  location /api/v1/ {
    proxy_pass http://api_v1_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/v2/ {
    proxy_pass http://api_v2_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/slow/ {
    proxy_read_timeout 60s;
    proxy_pass http://api_slow_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_pass http://ws_upstream/ws;
  }
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate     /etc/nginx/ssl/server.crt;
