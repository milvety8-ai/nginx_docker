# nginx/conf.d/proxy.conf

# Карта для определения версии API
map $uri $api_version {
    ~^/api/v1  "v1";
    ~^/api/v2  "v2";
    default    "unknown";
}
# Round-robin балансировка между v1 и v2 (для /api/lb)
upstream api_pool {
    server api_v1:8000 weight=3;   # 75% трафика
    server api_v2:8000 weight=1;   # 25% трафика

    keepalive 16;                  # пул постоянных соединений
    keepalive_requests 100;
    keepalive_timeout  30s;
}
# Least-connections с медленным сервисом
upstream api_fair {
    least_conn;
    server api_v1:8000;
    server api_v2:8000;
    server api_slow:8000 max_fails=2 fail_timeout=10s;
}

# IP-hash: sticky sessions
upstream api_sticky {
    ip_hash;
    server api_v1:8000;
    server api_v2:8000;
}

server {
    listen  80;
    server_name  api.localhost;   # Отдельный виртуальный хост
    add_header X-Request-ID $request_id always;

    location = /api/v1 {
        return 301 /api/v1/;
    }

    # Проксирование /api/v1/* → сервис api_v1/*
    location /api/v1/ {
        proxy_pass         http://api_v1:8000/;
        proxy_http_version 1.1;

        # Стандартные proxy-заголовки
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-API-Version      $api_version;

        # Таймауты
        proxy_connect_timeout   5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     30s;

        # Буферы
        proxy_buffering         on;
        proxy_buffer_size      4k;
        proxy_buffers         8 4k;
    }

    location = /api/v2 {
        return 301 /api/v2/;
    }

    # Проксирование /api/v2/* → сервис api_v2/*
    location /api/v2/ {
        proxy_pass         http://api_v2:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-API-Version     $api_version;
        proxy_connect_timeout 5s;
        proxy_read_timeout   30s;
    }

    # Редирект корня виртуального хоста на latest API info
    location = / {
        return 302 /api/v2/info;
    }

    # Реврайт: /api без версии → /api/v2 (latest)
    location = /api {
        return 302 /api/v2/info;
    }
        # Weighted round-robin
    location /api/lb {
        proxy_pass         http://api_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;

        # Retry на следующий сервер при ошибках
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries     3;
        proxy_next_upstream_timeout  10s;

        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
    }

    # Least-connections (с медленным сервером)
    location /api/fair {
        proxy_pass         http://api_fair;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 5s;          # короткий таймаут
        proxy_next_upstream timeout error;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # IP-hash (sticky)
    location /api/sticky {
        proxy_pass         http://api_sticky;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        add_header X-Upstream-Addr $upstream_addr always;
    }
    # Кэширующий endpoint — только GET, только 200 OK
    location /api/cached/ {
        proxy_pass         http://api_pool/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;

        proxy_cache              api_cache;
        proxy_cache_valid        200  30s;   # кэш 30 сек
        proxy_cache_valid        404   5s;
        proxy_cache_methods      GET;
        proxy_cache_use_stale    error timeout updating;
        proxy_cache_lock         on;

        # Оставляем короткое имя заголовка под тестовый скрипт.
        add_header  X-Cache         $upstream_cache_status  always;
        add_header  X-Upstream-Addr $upstream_addr          always;

        # Не кэшировать если клиент прислал Cache-Control: no-cache
        proxy_cache_bypass  $http_pragma $http_authorization;
    }

}
