# nginx/conf.d/proxy.conf

# Карта для определения версии API
map $uri $api_version {
    ~^/api/v1  "v1";
    ~^/api/v2  "v2";
    default    "unknown";
}

server {
    listen  80;
    server_name  api.localhost;   # Отдельный виртуальный хост

    # Проксирование /api/v1 → сервис api_v1
    location /api/v1 {
        proxy_pass         http://api_v1:5000;
        proxy_http_version 1.1;

        # Стандартные proxy-заголовки
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-API-Version      $api_version;

        # Таймауты
        proxy_connect_timeout   5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     30s;

        # Буферы
        proxy_buffering         on;
        proxy_buffer_size      4k;
        proxy_buffers         8 4k;
    }

    # Проксирование /api/v2 → сервис api_v2
    location /api/v2 {
        proxy_pass         http://api_v2:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout   30s;
    }

    # Реврайт: /api без версии → /api/v2 (latest)
    location = /api {
        return 302 /api/v2/info;
    }
}